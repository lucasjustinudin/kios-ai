llm:
  provider: mimo
  model: mimo-v2.5-reasoning
  base_url: https://api.xiaomimimo.com/v1
  api_key: ${MIMO_API_KEY}

whatsapp:
  provider: fonnte
  api_key: ${FONNTE_API_KEY}
  webhook_url: https://your-domain.com/webhook/wa

inventory:
  database_url: ${DATABASE_URL}
  redis_url: ${REDIS_URL}
  low_stock_threshold: 5

analytics:
  schedule: "0 22 * * *"
  report_recipients:
    - "+6281234567890"

escalation:
  admins:
    - "+6281234567890"
